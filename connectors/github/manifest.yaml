# GitHub — a real (MCP-backed) connector over the official GitHub MCP server.
#
# Bring your own token: set GITHUB_PERSONAL_ACCESS_TOKEN in the environment that
# runs Tiles AI. The board shows tiles bound here as "needs token" until it is
# set; nothing is sent anywhere until you activate a tile.
#
# Tool names below follow the official @modelcontextprotocol/server-github. If
# your server version differs, adjust this surface — it is the authority the
# registry validates and the gate trusts.
id: github
app: GitHub
kind: mcp
endpoint: "npx -y @modelcontextprotocol/server-github"

auth:
  scheme: api_key
  env: [GITHUB_PERSONAL_ACCESS_TOKEN]

tools:
  - { name: search_repositories, description: Search repositories., side_effect: false }
  - { name: list_issues, description: List issues in a repo., side_effect: false }
  - { name: get_issue, description: Get one issue., side_effect: false }
  - { name: search_issues, description: Search issues., side_effect: false }
  - { name: list_pull_requests, description: List pull requests., side_effect: false }
  - { name: get_pull_request, description: Get one pull request., side_effect: false }
  - { name: add_issue_comment, description: Comment on an issue., side_effect: true }
  - { name: create_issue, description: Open a new issue., side_effect: true }
