<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="-10%" r="120%">
      <stop offset="0%" stop-color="#1b1b1f"/>
      <stop offset="60%" stop-color="#0c0c0e"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a40"/>
      <stop offset="55%" stop-color="#29292e"/>
      <stop offset="100%" stop-color="#1d1d21"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="720" height="360" fill="url(#bg)"/>

  <!-- nav bar -->
  <rect width="720" height="52" fill="#16161a"/>
  <line x1="0" y1="52" x2="720" y2="52" stroke="#ffffff" stroke-opacity="0.07"/>
  <g transform="translate(28,20)">
    <rect x="0" y="0" width="14" height="14" rx="2" fill="#30d158"/>
    <text x="22" y="12" fill="#f5f5f7" font-size="15" font-weight="700">Tiles AI</text>
  </g>
  <g transform="translate(548,16)">
    <rect width="144" height="22" rx="11" fill="#78788033"/>
    <circle cx="16" cy="11" r="4" fill="#4c8dff"/>
    <text x="28" y="15" fill="#c8c8cf" font-size="11">claude-opus-4-8</text>
  </g>

  <!-- INSTANT section -->
  <text x="28" y="88" fill="#8b8b93" font-size="11" font-weight="600" letter-spacing="1.5">INSTANT · NO SETUP</text>

  <!-- a row of app-icon tiles -->
  <g>
    <!-- tile template helper via repeated groups -->
    <!-- Ask (running) -->
    <g transform="translate(28,104)">
      <rect width="66" height="66" rx="16" fill="url(#tile)" stroke="#30d158" stroke-width="1.5"/>
      <rect x="1" y="1" width="64" height="30" rx="15" fill="url(#gloss)"/>
      <circle cx="48" cy="14" r="4" fill="#28a0a0"/><circle cx="33" cy="30" r="9" fill="#cfd3d8"/>
      <circle cx="62" cy="4" r="6" fill="#30d158" stroke="#0c0c0e" stroke-width="2"/>
      <text x="33" y="86" fill="#e6e9ef" font-size="11" text-anchor="middle">Ask</text>
    </g>
    <!-- Summarize -->
    <g transform="translate(122,104)">
      <rect width="66" height="66" rx="16" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.1"/>
      <rect x="1" y="1" width="64" height="30" rx="15" fill="url(#gloss)"/>
      <rect x="20" y="20" width="26" height="26" rx="3" fill="#cfd3d8"/>
      <text x="33" y="86" fill="#e6e9ef" font-size="11" text-anchor="middle">Summarize</text>
    </g>
    <!-- Translate -->
    <g transform="translate(216,104)">
      <rect width="66" height="66" rx="16" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.1"/>
      <rect x="1" y="1" width="64" height="30" rx="15" fill="url(#gloss)"/>
      <circle cx="33" cy="33" r="13" fill="none" stroke="#7ab8ff" stroke-width="2.5"/>
      <text x="33" y="86" fill="#e6e9ef" font-size="11" text-anchor="middle">Translate</text>
    </g>
    <!-- Tidy (draft) -->
    <g transform="translate(310,104)">
      <rect width="66" height="66" rx="16" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.1"/>
      <rect x="1" y="1" width="64" height="30" rx="15" fill="url(#gloss)"/>
      <rect x="20" y="22" width="26" height="20" rx="3" fill="#e8b766"/>
      <text x="33" y="86" fill="#e6e9ef" font-size="11" text-anchor="middle">Tidy Folder</text>
    </g>
    <!-- + New tile -->
    <g transform="translate(404,104)">
      <rect width="66" height="66" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2" stroke-dasharray="5 4"/>
      <text x="33" y="44" fill="#8b8b93" font-size="30" text-anchor="middle" font-weight="300">+</text>
      <text x="33" y="86" fill="#8b8b93" font-size="11" text-anchor="middle">New tile</text>
    </g>
    <!-- New app -->
    <g transform="translate(498,104)">
      <rect width="66" height="66" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2" stroke-dasharray="5 4"/>
      <text x="33" y="42" fill="#8b8b93" font-size="22" text-anchor="middle">🔌</text>
      <text x="33" y="86" fill="#8b8b93" font-size="11" text-anchor="middle">New app</text>
    </g>
  </g>

  <!-- caption -->
  <text x="28" y="248" fill="#c8c8cf" font-size="15" font-weight="600">A home screen for your AI agents.</text>
  <text x="28" y="272" fill="#8b8b93" font-size="13">Tap a tile to run it (green = running). Create tiles and connect apps right from the board.</text>
  <g transform="translate(28,296)" font-size="12" fill="#8b8b93">
    <rect width="290" height="26" rx="8" fill="#78788022"/>
    <text x="14" y="17" fill="#a8a8b0">register · activate · observe · permission · compose</text>
  </g>
</svg>
